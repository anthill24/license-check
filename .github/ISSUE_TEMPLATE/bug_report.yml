name: Bug report
description: Report incorrect behaviour, a crash, or wrong license detection.
title: "[bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! Please remember that license-check is
        informational tooling, not legal advice — "the category for X should be
        Y" judgement calls are best filed as a feature/discussion, while a
        package being *misdetected* (wrong SPDX id, missed LICENSE file, crash)
        is a bug.
  - type: textarea
    id: what-happened
    attributes:
      label: What happened?
      description: A clear description of the bug, including any error output.
      placeholder: license-check reported X as unknown, but it declares MIT in package.json.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Ideally a minimal package.json / node_modules layout that triggers it.
      placeholder: |
        1. `license-check scan --dir ./repro`
        2. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behaviour
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: license-check version
      description: Output of `license-check --version`.
      placeholder: "0.1.0"
    validations:
      required: true
  - type: input
    id: node-version
    attributes:
      label: Node.js version
      description: Output of `node --version`.
      placeholder: "v20.x"
    validations:
      required: true
  - type: input
    id: os
    attributes:
      label: Operating system
      placeholder: "macOS 14 / Ubuntu 22.04 / Windows 11"
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Anything else?
      description: Relevant policy file, package manager (npm/yarn/pnpm), logs, etc.
    validations:
      required: false
