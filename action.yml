name: "license-check"
description: "Scan npm dependencies for license policy violations and missing licenses. Offline, SPDX-aware. Informational, not legal advice."
author: "anthill24"
branding:
  icon: "shield"
  color: "green"

inputs:
  directory:
    description: "Project root to scan (must contain package.json and an installed node_modules)."
    required: false
    default: "."
  policy:
    description: "Path to a policy/config file. If empty, .licensecheckrc.json in the project directory is auto-detected."
    required: false
    default: ""
  include-dev:
    description: "Include devDependencies in the scan."
    required: false
    default: "false"
  allow-unknown:
    description: "Do not treat unknown/missing licenses as policy violations."
    required: false
    default: "false"
  fail-on-violations:
    description: "Fail the workflow step when policy violations are found."
    required: false
    default: "true"

outputs:
  violations:
    description: "Number of policy violations found."
    value: ${{ steps.run.outputs.violations }}

runs:
  using: "composite"
  steps:
    # Build the CLI from this action's own source. node_modules is not checked
    # out with the action, so install + build here. This keeps build artifacts
    # out of version control at the cost of a short build on first use.
    - name: Build license-check
      shell: bash
      working-directory: ${{ github.action_path }}
      run: |
        set -euo pipefail
        npm ci --no-audit --no-fund
        npm run build

    - name: Run license-check
      id: run
      shell: bash
      # Inputs are passed through the environment, never interpolated into the
      # script body, so a value containing shell metacharacters cannot inject
      # commands. The script only ever references them as quoted "$VAR".
      env:
        ACTION_PATH: ${{ github.action_path }}
        INPUT_DIRECTORY: ${{ inputs.directory }}
        INPUT_POLICY: ${{ inputs.policy }}
        INPUT_INCLUDE_DEV: ${{ inputs.include-dev }}
        INPUT_ALLOW_UNKNOWN: ${{ inputs.allow-unknown }}
        INPUT_FAIL_ON_VIOLATIONS: ${{ inputs.fail-on-violations }}
      run: |
        # No errexit: the scan is *expected* to exit non-zero on violations and
        # we capture that explicitly. -u/pipefail still catch real mistakes.
        set -uo pipefail
        CLI="$ACTION_PATH/dist/cli.js"

        FLAGS=(--dir "$INPUT_DIRECTORY" --no-color)
        [ "$INPUT_INCLUDE_DEV" = "true" ] && FLAGS+=(--include-dev)
        [ "$INPUT_ALLOW_UNKNOWN" = "true" ] && FLAGS+=(--allow-unknown)
        if [ -n "$INPUT_POLICY" ]; then
          FLAGS+=(--policy "$INPUT_POLICY")
        fi

        REPORT_FLAGS=(--dir "$INPUT_DIRECTORY")
        [ "$INPUT_INCLUDE_DEV" = "true" ] && REPORT_FLAGS+=(--include-dev)

        # 1) Append a Markdown license inventory to the job summary (best effort).
        {
          echo "## License check"
          echo
          node "$CLI" report --format markdown "${REPORT_FLAGS[@]}" || echo "_(report generation failed)_"
        } >> "$GITHUB_STEP_SUMMARY"

        # 2) Run the policy scan; capture stdout (table) and stderr (violations).
        node "$CLI" scan "${FLAGS[@]}" 1> scan.out 2> scan.err
        CODE=$?

        # Surface violations in the summary and step log.
        if [ "$CODE" -eq 1 ]; then
          {
            echo
            echo "### ❌ Policy violations"
            echo
            echo '```'
            cat scan.err
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
          echo "::error::license-check found policy violations"
          cat scan.err
        fi

        VIOLATIONS=$(grep -c '^  - ' scan.err || true)
        echo "violations=${VIOLATIONS}" >> "$GITHUB_OUTPUT"

        if [ "$CODE" -eq 2 ]; then
          echo "::error::license-check failed to run"
          cat scan.err
          exit 2
        fi

        if [ "$CODE" -eq 1 ] && [ "$INPUT_FAIL_ON_VIOLATIONS" = "true" ]; then
          exit 1
        fi
        exit 0
